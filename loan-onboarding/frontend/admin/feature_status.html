.feature-num{font-size:10px;font-weight:700;color:var(--text-muted);min-width:24px}

.feature-tech{font-size:10px;color:var(--text-muted);margin-top:2px}
.status-pill{font-size:10px;font-weight:700;padding:2px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.s-live{background:#dcfce7;color:#16a34a}
.s-mock{background:#dbeafe;color:#1d4ed8}
.s-hypo{background:#f3e8ff;color:#7c3aed}

.d-med{background:#faeeda;color:#633806}
.d-hard{background:#fcebeb;color:#791f1f}
.d-hypo{background:#eeedfe;color:#3c3489}
.summary-bar{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.sum-item{background:white;border:1px solid var(--border);border-radius:10px;padding:12px 20px;text-align:center;flex:1;min-width:120px}
.sum-num{font-size:28px;font-weight:800}
.sum-lbl{font-size:11px;color:var(--text-muted);margin-top:2px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.fb{font-size:11px;padding:5px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
.fb.active,.fb:hover{background:var(--primary);color:white;border-color:var(--primary)}

let currentFilter='all';

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid(){
  const filtered=FEATURES.filter(f=>currentFilter==='all'||f.diff===currentFilter);
  const grid=document.getElementById('featureGrid');
  grid.innerHTML=filtered.map(f=>{
    const statusClass=f.status==='live'?'s-live':f.status==='mock'?'s-mock':'s-hypo';
    const statusLabel=f.status==='live'?'✅ LIVE':f.status==='mock'?'🔵 MOCK':'🟣 STUB';
    const diffMap={built:'d-built',easy:'d-easy',med:'d-med',hard:'d-hard',hypo:'d-hypo'};
    const diffLabel={built:'Built',easy:'Easy',med:'Medium',hard:'Hard',hypo:'Hypothetical'};
    return `<div class="feature-card">
      <span class="feature-num">#${f.n}</span>
      <div class="feature-info">
        <div class="feature-name">${f.name} <span class="diff-badge ${diffMap[f.diff]}">${diffLabel[f.diff]}</span></div>
        <div class="feature-tech">${f.tech}</div>
        <div style="font-size:9px;color:#94a3b8;margin-top:2px;font-family:monospace">${f.endpoint}</div>
      </div>
      <span class="status-pill ${statusClass}">${statusLabel}</span>
    </div>`;
  }).join('');
  
  document.getElementById('liveCount').textContent=`${FEATURES.filter(f=>f.status==='live').length}/75 Live`;
  document.getElementById('s-live').textContent=FEATURES.filter(f=>f.status==='live').length;
  document.getElementById('s-mock').textContent=FEATURES.filter(f=>f.status==='mock').length;
  document.getElementById('s-hypo').textContent=FEATURES.filter(f=>f.status==='hypo').length;
}

renderGrid();
