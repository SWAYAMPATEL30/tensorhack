<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><title>Model Performance — Poonawalla Loan Wizard</title>
<link rel="stylesheet" href="css/main.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
.model-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; }
.model-card { background:white; border-radius:16px; padding:24px; border:1px solid #e2e8f0; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.model-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.model-name-big { font-size:15px; font-weight:700; color:#1e293b; }
.gauge-row { display:flex; gap:16px; margin-bottom:16px; }
.mini-gauge { flex:1; text-align:center; }
.mini-gauge-val { font-size:22px; font-weight:800; color:#1e293b; }
.mini-gauge-label { font-size:10px; color:#94a3b8; text-transform:uppercase; }
.drift-bar { height:8px; border-radius:4px; background:#e2e8f0; margin-top:8px; overflow:hidden; }
.drift-fill { height:100%; border-radius:4px; }
</style>
</head><body>
<nav class="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">PF</div><div><h1>Poonawalla Fincorp</h1><span>Loan Wizard AI</span></div></div>
  <div class="sidebar-nav">
    <a href="index.html" class="nav-item">🏠 Dashboard</a>
    <a href="video_call.html" class="nav-item">📹 New Application</a>
    <a href="analytics.html" class="nav-item">📊 Analytics</a>
    <a href="model_perf.html" class="nav-item active">⚡ Model Performance</a>
    <a href="audit.html" class="nav-item">📋 Audit Trail</a>
    <a href="monitor.html" class="nav-item">🛡 Live Monitor</a>
  </div>
</nav>
<div class="main">
  <div class="topbar"><h2>⚡ Model Performance</h2>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="retrain()">🔄 Trigger Retrain</button>
    </div>
  </div>
  <div class="content">
    <div id="modelGrid" class="model-grid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8"><div class="spinner" style="margin:auto"></div></div>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
const MODELS_META = {
  'Credit Risk XGBoost': { icon: '💰', trained: '50,000 rows', target: 'AUC > 0.82', drift: 2.1 },
  'Fraud Detector':       { icon: '🚨', trained: '30,000 rows', target: 'Recall > 0.88', drift: 1.3 },
  'Age Validator':        { icon: '👤', trained: '20,000 rows', target: 'MAE < 5yr', drift: 0.4 },
  'Offer Engine':         { icon: '🎯', trained: '40,000 rows', target: 'RMSE < ₹10k', drift: 3.2 },
  'Speech Intent':        { icon: '🎙', trained: '5,000 records', target: 'MacroF1 > 0.80', drift: 5.8 },
  'Emotion Classifier':   { icon: '😊', trained: '15,000 rows', target: 'WeightedF1 > 0.72', drift: 0.8 },
};

async function loadPerf() {
  const data = await API.get('/api/analytics/model-performance');
  const grid = document.getElementById('modelGrid');
  grid.innerHTML = Object.entries(data.models).map(([nm, m]) => {
    const meta = MODELS_META[nm] || {};
    const auc = m.auc ? (m.auc*100).toFixed(1) : null;
    const f1  = m.f1  ? (m.f1*100).toFixed(1)  : null;
    const drift = meta.drift || 0;
    const driftColor = drift > 10 ? '#EF4444' : drift > 5 ? '#F59E0B' : '#10B981';
    const loaded = m.loaded !== false;
    return `<div class="model-card">
      <div class="model-header">
        <div>
          <span class="status-dot ${loaded?'status-ok':'status-error'}"></span>
          <span class="model-name-big">${meta.icon||'🤖'} ${nm}</span>
        </div>
        <span class="badge ${loaded?'badge-green':'badge-red'}">${loaded?'LOADED':'FAILED'}</span>
      </div>
      <div class="gauge-row">
        ${auc?`<div class="mini-gauge"><div class="mini-gauge-val" style="color:${parseFloat(auc)>80?'#10B981':'#F59E0B'}">${auc}%</div><div class="mini-gauge-label">AUC-ROC</div></div>`:''}
        ${f1?`<div class="mini-gauge"><div class="mini-gauge-val" style="color:${parseFloat(f1)>80?'#10B981':'#F59E0B'}">${f1}%</div><div class="mini-gauge-label">F1 Score</div></div>`:''}
        ${m.rmse?`<div class="mini-gauge"><div class="mini-gauge-val" style="font-size:16px">₹${Number(m.rmse).toLocaleString('en-IN')}</div><div class="mini-gauge-label">RMSE</div></div>`:''}
        <div class="mini-gauge"><div class="mini-gauge-val">${m.predictions_today||0}</div><div class="mini-gauge-label">Today</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:6px">
        <span>Data Drift</span><span style="color:${driftColor};font-weight:600">${drift}%</span>
      </div>
      <div class="drift-bar"><div class="drift-fill" style="width:${Math.min(drift*10,100)}%;background:${driftColor}"></div></div>
      <div style="margin-top:12px;font-size:11px;color:#94a3b8">
        <div>Trained on: ${meta.trained||'—'}</div>
        <div>Target: ${meta.target||'—'}</div>
        <div>Latency: ${(m.latency_ms||0).toFixed(0)}ms</div>
      </div>
      ${drift>10?'<div style="margin-top:10px;padding:8px 12px;background:#fef2f2;border-radius:6px;font-size:11px;color:#dc2626">⚠️ Data drift >10%. Retrain recommended.</div>':''}
    </div>`;
  }).join('');
}

function retrain() {
  toast('Retraining pipeline triggered. Check retrain_log.csv for status.', 'info');
  // In real: POST to retrain endpoint
}

loadPerf();
setInterval(loadPerf, 3000);
</script></body></html>
