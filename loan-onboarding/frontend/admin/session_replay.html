<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Session Replay</title><link rel="stylesheet" href="css/main.css"><style>.ttrack{height:8px;background:#e2e8f0;border-radius:4px;position:relative;cursor:pointer;margin:8px 0}.tfill{height:100%;background:linear-gradient(to right,#2563EB,#10B981);border-radius:4px}.ev-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:12px}.ev-t{font-family:monospace;color:#94a3b8;min-width:50px}.ev-tag{font-size:10px;font-weight:700;padding:1px 8px;border-radius:999px;min-width:90px;text-align:center;white-space:nowrap}.tag-audit{background:#dbeafe;color:#1d4ed8}.tag-frame{background:#dcfce7;color:#166534}.tag-risk{background:#fef3c7;color:#92400e}.frame-box{background:#0f172a;border-radius:12px;height:220px;display:flex;align-items:center;justify-content:center;color:#475569;font-size:13px;text-align:center}.sp{border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;font-size:12px;transition:all .15s}.sp:hover,.sp.active{border-color:#2563EB;background:#eff6ff}</style></head>
<body>
<nav class="sidebar"><div class="sidebar-logo"><div class="logo-icon">PF</div><div><h1>Poonawalla Fincorp</h1><span>Loan Wizard AI</span></div></div><div class="sidebar-nav"><a href="index.html" class="nav-item">?? Dashboard</a><a href="fraud_ring.html" class="nav-item">?? Fraud Ring</a><a href="underwriter.html" class="nav-item">?? Underwriter</a><a href="session_replay.html" class="nav-item active">? Session Replay</a><a href="benchmark.html" class="nav-item">?? Benchmark</a><a href="stress_test.html" class="nav-item">? Stress Test</a><a href="fairness.html" class="nav-item">?? Fairness</a><a href="feature_status.html" class="nav-item">?? 75 Features</a></div></nav>
<div class="main"><div class="topbar"><h2>? Session Replay Ś Compliance Review</h2><div class="topbar-right"><span class="clock" id="clock"></span></div></div>
<div class="content">
<div class="card"><div class="card-title" style="margin-bottom:10px">Select Session</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px" id="sList">Loading...</div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
<div class="card"><div class="card-title">?? Frame Preview</div><div class="frame-box" id="fbox"><div>??<br>Select a session</div></div><div style="margin:10px 0"><div class="ttrack" id="track" onclick="seek(event)"><div class="tfill" id="tfill" style="width:0%"></div></div><div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span id="tLabel">00:00</span><span id="tDur">05:00</span></div></div><div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="pos-=10">?</button><button class="btn btn-primary" id="pbtn" onclick="togglePlay()">?</button><button class="btn btn-ghost" onclick="pos+=10">?</button></div></div>
<div class="card" style="max-height:500px;overflow-y:auto"><div class="card-title" style="margin-bottom:10px">?? Event Log</div><div id="evList"><div style="color:var(--text-muted);padding:24px;text-align:center">Select a session</div></div></div>
</div></div></div>
<script src="js/api.js"></script>
<script>
setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-IN'),1000);
let pos=0,dur=300,playing=false,intv;
const DEMO=[{id:'abc123',name:'Rahul Kumar',dec:'APPROVED'},{id:'xyz789',name:'Priya Sharma',dec:'REVIEW'},{id:'mno345',name:'Amit Patel',dec:'APPROVED'}];
const EVENTS=[{t:0,type:'audit',label:'SESSION_START',data:'GPS + Device fingerprint captured'},{t:15,type:'frame',label:'FACE_DETECTED',data:'Liveness:0.96 Age:28.5y'},{t:45,type:'audit',label:'STT_CHUNK',data:'"Hi my name is Rahul Kumar..."'},{t:80,type:'audit',label:'CONSENT',data:'Phrase detected: "haan main manta hoon"'},{t:120,type:'risk',label:'RISK_SCORED',data:'XGBoost: LOW, Score:0.18'},{t:150,type:'frame',label:'DEEPFAKE_PASS',data:'DCT score:0.02 Ś CLEAR'},{t:180,type:'audit',label:'BUREAU_PULLED',data:'CIBIL:748 Ś GOOD'},{t:220,type:'risk',label:'FRAUD_CHECK',data:'Fraud:0.12 Ś CLEAR'},{t:260,type:'audit',label:'OFFER_GEN',data:'Rs.3,00,000 @ 12.5% 36m'},{t:280,type:'audit',label:'COMPLETE',data:'Decision: APPROVED'}];
document.getElementById('sList').innerHTML=DEMO.map(s=>`<div class="sp" onclick="pick('${s.id}','${s.name}','${s.dec}',this)"><div style="font-family:monospace;color:#2563EB;font-weight:700">${s.id}...</div><div style="font-size:11px;color:#64748b">${s.name} Ę ${s.dec}</div></div>`).join('');
function pick(id,name,dec,el){document.querySelectorAll('.sp').forEach(e=>e.classList.remove('active'));el.classList.add('active');pos=0;render(0,name,dec);}
function render(t,name,dec){
  document.getElementById('fbox').innerHTML=`<div style="color:white;text-align:center"><div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#10B981);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;margin:0 auto 10px">${name[0]}</div><div style="font-size:14px;font-weight:600">${name}</div><div style="font-size:11px;color:#64748b;margin-top:4px">t=${Math.round(t)}s Ę ${dec}</div></div>`;
  document.getElementById('evList').innerHTML=EVENTS.map(e=>{const ts=`${Math.floor(e.t/60).toString().padStart(2,'0')}:${(e.t%60).toString().padStart(2,'0')}`;const cls=e.type==='frame'?'tag-frame':e.type==='risk'?'tag-risk':'tag-audit';return`<div class="ev-item" style="opacity:${e.t<=t?1:.3}"><span class="ev-t">${ts}</span><span class="ev-tag ${cls}">${e.label}</span><span style="flex:1;color:var(--text);font-size:11px">${e.data}</span></div>`}).join('');
}
function togglePlay(){playing=!playing;document.getElementById('pbtn').textContent=playing?'?':'?';if(playing)intv=setInterval(tick,100);else clearInterval(intv);}
function tick(){pos=Math.min(dur,pos+.1);const p=pos/dur*100;document.getElementById('tfill').style.width=p+'%';document.getElementById('tLabel').textContent=`${Math.floor(pos/60).toString().padStart(2,'0')}:${Math.floor(pos%60).toString().padStart(2,'0')}`;if(pos>=dur)togglePlay();}
function seek(e){const r=document.getElementById('track').getBoundingClientRect();pos=(e.clientX-r.left)/r.width*dur;}
</script></body></html>
