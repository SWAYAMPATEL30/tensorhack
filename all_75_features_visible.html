var current='all';

function setFilter(f,btn){
  current=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(){
  var filtered=F.filter(function(f){
    if(current==='all') return true;
    return f.diff===current;
  });
  document.getElementById('counter').textContent='Showing '+filtered.length+' of 75 features';
  var html='';
  filtered.forEach(function(f){
    var diffLbl={built:'Already built',easy:'Easy — 1-2 days',med:'Medium — 3-7 days',hard:'Hard — 1-2 weeks',hypo:'Hypothetical / Future'}[f.diff]||f.diff;
    var diffCls={built:'t-built',easy:'t-easy',med:'t-med',hard:'t-hard',hypo:'t-hypo'}[f.diff]||'t-med';
    var critTags=f.crit.map(function(c){
      var lbl={digit:'Digitisation',acc:'Accuracy',risk:'Risk',intel:'Intelligence',scale:'Scalability'}[c]||c;
      var cls='t-'+c;
      return '<span class="tag '+cls+'">'+lbl+'</span>';
    }).join('');
    var stepsHtml=f.steps.map(function(s,i){
      return '<div class="step"><div class="sdot">'+(i+1)+'</div><div class="stxt">'+s+'</div></div>';
    }).join('');
    html+='<div class="card">'
      +'<div class="card-head"><span class="num">'+f.n+'</span><span class="name">'+f.name+'</span></div>'
      +'<div class="tags">'+critTags+'<span class="tag '+diffCls+'">'+diffLbl+'</span></div>'
      +'<div class="desc">'+f.desc+'</div>'
      +'<div class="meta">'
      +'<div class="meta-box"><div class="meta-lbl">Tech stack</div><div class="meta-val">'+f.tech+'</div></div>'
      +'<div class="meta-box"><div class="meta-lbl">Effort</div><div class="meta-val">'+f.effort+'</div></div>'
      +'<div class="meta-box meta-full"><div class="meta-lbl">Impact</div><div class="meta-val">'+f.impact+'</div></div>'
      +'<div class="meta-box meta-full"><div class="meta-lbl">Judging criteria</div><div class="meta-val">'+f.judge+'</div></div>'
      +'</div>'
      +'<div class="steps-title">Step-by-step implementation</div>'
      +stepsHtml
      +'<div class="ask"><button onclick="sendPrompt(\'Generate complete production-ready code for: '+f.name.replace(/'/g,"\\'")+'\')">'
      +'Generate full code ↗</button></div>'
      +'<div class="divider"></div>'
      +'</div>';
  });
  document.getElementById('list').innerHTML=html;
}

renderList();
</script>
